version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: librescroll:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

# Dokploy generalmente utiliza un docker-compose para orquestar el build y deploy,
# basta con apuntar al docker-compose.yml en la configuración de Dokploy.
